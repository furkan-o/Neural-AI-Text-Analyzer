<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1f1f1f;
      --input-bg: #f1f3f4;
      --input-border: transparent;
      --btn-bg: linear-gradient(135deg, #4285f4, #8ab4f8);
      --btn-hover: linear-gradient(135deg, #1a73e8, #4285f4);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #18181b;
        --text-color: #e8eaed;
        --input-bg: #27272a;
        --input-border: rgba(255, 255, 255, 0.1);
        --btn-bg: linear-gradient(135deg, #4285f4, #8ab4f8);
        --btn-hover: linear-gradient(135deg, #8ab4f8, #aecbfa);
      }
    }

    body {
      margin: 0;
      padding: 24px;
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    .header-container {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .neural-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ea4335, #fbbc04, #34a853, #4285f4);
      margin-right: 12px;
    }

    h4 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--input-border);
      border-radius: 16px; /* Pill shape */
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    input:focus {
      box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.3);
      background: var(--bg-color);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px; /* Pill shape */
      background: var(--btn-bg);
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.1s ease;
      box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2);
    }

    button:hover { background: var(--btn-hover); }
    button:active { transform: scale(0.98); }

    .status-msg {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      color: #34a853;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <div class="neural-dot"></div>
    <h4>Neural Text Analiz</h4>
  </div>

  <div class="input-wrapper">
    <input type="password" id="apiKey" placeholder="Gemini API Anahtarı" autocomplete="off" />
  </div>
  
  <button id="saveBtn">Sisteme Kaydet</button>
  <div class="status-msg" id="status">Anahtar güvenle kaydedildi!</div>

  <script src="popup.js"></script>
</body>
</html>
